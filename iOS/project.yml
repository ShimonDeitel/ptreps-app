name: Physical Therapy Reps
options:
  bundleIdPrefix: com.shimondeitel.ptreps
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Physical Therapy Reps:
    type: application
    platform: iOS
    sources:
      - path: Physical Therapy Reps
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ptreps
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Physical Therapy Reps/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Physical Therapy RepsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Physical Therapy RepsTests
      - path: Physical Therapy Reps.storekit
    dependencies:
      - target: Physical Therapy Reps
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ptreps.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Physical Therapy RepsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Physical Therapy RepsUITests
    dependencies:
      - target: Physical Therapy Reps
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ptreps.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Physical Therapy Reps:
    build:
      targets:
        Physical Therapy Reps: all
        Physical Therapy RepsTests: [test]
        Physical Therapy RepsUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Physical Therapy Reps.storekit
    test:
      config: Debug
      storeKitConfiguration: Physical Therapy Reps.storekit
      targets:
        - Physical Therapy RepsTests
        - Physical Therapy RepsUITests
    archive:
      config: Release
